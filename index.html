<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ravel Robaina — Aulas de Inglês</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sun: #FFD84D;
    --coral: #FF6B6B;
    --deep: #1A1035;
    --mint: #00C9A7;
    --cream: #FFF8F0;
    --glass: rgba(255,248,240,0.06);
    --border: rgba(255,248,240,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--deep);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG blobs */
  .bg-canvas { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
  .blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.15; animation: float 12s ease-in-out infinite; }
  .blob-1 { width: 550px; height: 550px; background: var(--coral); top: -120px; left: -120px; animation-delay: 0s; }
  .blob-2 { width: 420px; height: 420px; background: var(--mint); bottom: -100px; right: -100px; animation-delay: 4s; }
  .blob-3 { width: 320px; height: 320px; background: var(--sun); top: 45%; left: 35%; animation-delay: 8s; }
  @keyframes float {
    0%,100% { transform: translate(0,0) scale(1); }
    33%      { transform: translate(18px,-18px) scale(1.04); }
    66%      { transform: translate(-12px,14px) scale(0.96); }
  }

  /* Lang switcher */
  .lang-bar {
    position: relative; z-index: 10;
    display: flex; justify-content: center; gap: 8px;
    padding: 22px 20px 0;
    animation: fadeDown 0.6s ease both;
  }
  .lang-btn {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,248,240,0.07);
    border: 1.5px solid rgba(255,248,240,0.15);
    border-radius: 999px; padding: 7px 16px;
    color: rgba(255,248,240,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.05em;
  }
  .lang-btn:hover { border-color: var(--mint); color: var(--cream); }
  .lang-btn.active { background: var(--mint); border-color: var(--mint); color: var(--deep); }

  /* Page layout */
  .page {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    padding: 32px 20px 80px;
    gap: 0;
  }

  /* ─── HERO ─── */
  .hero {
    text-align: center; max-width: 600px;
    margin-bottom: 40px;
    animation: fadeUp 0.9s ease 0.1s both;
  }
  .brand-name {
    font-size: 0.78rem; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,248,240,0.4);
    margin-bottom: 16px;
  }
  .tag {
    display: inline-block;
    background: var(--mint); color: var(--deep);
    font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 6px 16px; border-radius: 999px; margin-bottom: 20px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 7vw, 3.8rem);
    line-height: 1.1; margin-bottom: 18px;
  }
  h1 em {
    font-style: normal; color: var(--sun); position: relative;
  }
  h1 em::after {
    content: ''; position: absolute;
    bottom: 2px; left: 0; right: 0;
    height: 4px; background: var(--sun);
    border-radius: 2px; opacity: 0.35;
  }
  .subtitle {
    font-size: 1.05rem; line-height: 1.7;
    color: rgba(255,248,240,0.7);
    margin-bottom: 24px; font-weight: 300;
  }
  .proof {
    display: flex; gap: 6px; align-items: center;
    justify-content: center;
    font-size: 0.85rem; color: rgba(255,248,240,0.5);
  }
  .proof .stars { color: var(--sun); letter-spacing: 2px; }
  .proof strong { color: var(--cream); }

  /* ─── MÉTODO (5 pilares) ─── */
  .method-section {
    width: 100%; max-width: 680px;
    margin-bottom: 48px;
    animation: fadeUp 1s ease 0.2s both;
  }
  .section-label {
    text-align: center;
    font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--mint); margin-bottom: 10px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    text-align: center; margin-bottom: 10px;
  }
  .section-desc {
    text-align: center; font-size: 0.92rem;
    color: rgba(255,248,240,0.6); line-height: 1.7;
    margin-bottom: 28px; font-weight: 300;
    max-width: 520px; margin-left: auto; margin-right: auto;
  }
  .pillars {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .pillar {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 12px 18px;
    text-align: center;
    transition: transform 0.25s, border-color 0.25s;
    cursor: default;
  }
  .pillar:hover {
    transform: translateY(-4px);
    border-color: rgba(0,201,167,0.4);
  }
  .pillar-num {
    font-size: 0.68rem; font-weight: 700;
    color: var(--mint); letter-spacing: 0.12em;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .pillar-icon { font-size: 1.6rem; margin-bottom: 10px; }
  .pillar-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem; margin-bottom: 6px;
    color: var(--cream);
  }
  .pillar-text {
    font-size: 0.72rem; line-height: 1.5;
    color: rgba(255,248,240,0.5);
  }

  /* Science badge */
  .science-badge {
    display: flex; align-items: flex-start; gap: 14px;
    background: rgba(0,201,167,0.08);
    border: 1px solid rgba(0,201,167,0.25);
    border-radius: 16px; padding: 18px 20px;
    margin-top: 20px;
  }
  .science-badge-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
  .science-badge-text { font-size: 0.83rem; color: rgba(255,248,240,0.65); line-height: 1.6; }
  .science-badge-text strong { color: var(--mint); }

  /* ─── FORM CARD ─── */
  .card {
    width: 100%; max-width: 480px;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 24px; padding: 36px 32px;
    backdrop-filter: blur(16px);
    animation: fadeUp 1s ease 0.3s both;
    margin-bottom: 48px;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem; margin-bottom: 6px; text-align: center;
  }
  .card-sub {
    text-align: center; font-size: 0.85rem;
    color: rgba(255,248,240,0.45); margin-bottom: 28px;
  }
  .field { margin-bottom: 18px; }
  label {
    display: block; font-size: 0.78rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(255,248,240,0.55); margin-bottom: 8px;
  }
  input, textarea {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,248,240,0.15);
    border-radius: 12px; padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; color: var(--cream);
    outline: none; transition: border-color 0.25s, background 0.25s;
  }
  input::placeholder, textarea::placeholder { color: rgba(255,248,240,0.28); }
  input:focus, textarea:focus { border-color: var(--mint); background: rgba(0,201,167,0.08); }
  textarea { resize: none; height: 90px; }

  .pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill { display: flex; align-items: center; cursor: pointer; }
  .pill input[type="radio"] { display: none; }
  .pill-label {
    padding: 8px 14px; border-radius: 999px;
    border: 1.5px solid rgba(255,248,240,0.2);
    font-size: 0.79rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    color: rgba(255,248,240,0.6); user-select: none;
  }
  .pill input:checked + .pill-label {
    background: var(--mint); border-color: var(--mint);
    color: var(--deep); font-weight: 600;
  }

  .cta {
    width: 100%; margin-top: 8px; padding: 16px;
    border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--coral), #ff4f81);
    color: white; font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    letter-spacing: 0.04em;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 30px rgba(255,107,107,0.35);
  }
  .cta:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,107,107,0.5); }
  .cta:active { transform: translateY(0); }
  .cta:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .cta-note {
    text-align: center; font-size: 0.75rem;
    color: rgba(255,248,240,0.3); margin-top: 12px;
  }

  /* ─── SUCCESS ─── */
  .success {
    display: none; flex-direction: column;
    align-items: center; text-align: center;
    padding: 20px 0; gap: 14px;
  }
  .success-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--mint), #00a88d);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; box-shadow: 0 8px 30px rgba(0,201,167,0.35);
  }
  .success h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; }
  .success p { font-size: 0.9rem; color: rgba(255,248,240,0.65); line-height: 1.6; }
  .success-accent { color: var(--mint) !important; font-weight: 500; }

  /* ─── BENEFITS strip ─── */
  .benefits {
    display: flex; gap: 14px; flex-wrap: wrap;
    justify-content: center;
    max-width: 680px;
    animation: fadeUp 1s ease 0.5s both;
    margin-bottom: 48px;
  }
  .benefit {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 16px 18px;
    flex: 1; min-width: 180px;
  }
  .benefit-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
  .benefit-text { font-size: 0.82rem; line-height: 1.5; color: rgba(255,248,240,0.65); }
  .benefit-text strong { display: block; color: var(--cream); font-size: 0.88rem; margin-bottom: 2px; }

  footer {
    font-size: 0.75rem;
    color: rgba(255,248,240,0.2); text-align: center;
    animation: fadeUp 1s ease 0.7s both;
  }
  .footer-brand { color: rgba(255,248,240,0.35); font-weight: 600; letter-spacing: 0.08em; }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(30px);  } to { opacity:1; transform:translateY(0); } }
  @keyframes shake {
    0%,100% { transform:translateX(0); }
    20%     { transform:translateX(-8px); }
    40%     { transform:translateX(8px); }
    60%     { transform:translateX(-6px); }
    80%     { transform:translateX(6px); }
  }

  @media (max-width: 600px) {
    .pillars { grid-template-columns: repeat(3, 1fr); }
    .pillar:nth-child(4), .pillar:nth-child(5) { grid-column: span 1; }
    .pillars { grid-template-columns: repeat(2, 1fr); }
    .pillar:last-child { grid-column: 1 / -1; }
    .card { padding: 26px 18px; }
    .lang-name { display: none; }
  }
</style>
</head>

      <p id="t-success-body"></p>
      <p class="success-accent" id="t-success-accent"></p>

  </div>

  <footer>
    <p id="t-footer"></p>
    <p style="margin-top:6px" class="footer-brand">RAVEL ROBAINA</p>
  </footer>

</div>

let currentLang = 'pt';

function setLang(lang) {
  currentLang = lang;
  const t = translations[lang];
  document.documentElement.lang = t.lang;

  ['pt','en','fr'].forEach(l =>
    document.getElementById('btn-'+l).classList.toggle('active', l===lang)
  );

  // Hero
  document.getElementById('t-tag').textContent      = t.tag;
  document.getElementById('t-h1').innerHTML         = t.h1;
  document.getElementById('t-subtitle').textContent = t.subtitle;
  document.getElementById('t-proof').innerHTML      = t.proof;

  // Method section
  document.getElementById('t-method-label').textContent = t.methodLabel;
  document.getElementById('t-method-title').textContent = t.methodTitle;
  document.getElementById('t-method-desc').textContent  = t.methodDesc;
  document.getElementById('t-science').innerHTML        = t.science;

  // Pillars
  const pc = document.getElementById('pillars-container');
  pc.innerHTML = '';
  t.pillars.forEach(p => {
    const el = document.createElement('div');
    el.className = 'pillar';
    el.innerHTML = `
      <p class="pillar-num">${p.num}</p>
      <div class="pillar-icon">${p.icon}</div>
      <p class="pillar-title">${p.title}</p>
      <p class="pillar-text">${p.text}</p>
    `;
    pc.appendChild(el);
  });

  // Benefits
  document.getElementById('t-b1-title').textContent = t.b1Title;
  document.getElementById('t-b1-text').textContent  = t.b1Text;
  document.getElementById('t-b2-title').textContent = t.b2Title;
  document.getElementById('t-b2-text').textContent  = t.b2Text;
  document.getElementById('t-b3-title').textContent = t.b3Title;
  document.getElementById('t-b3-text').textContent  = t.b3Text;

  // Card
  document.getElementById('t-card-title').textContent  = t.cardTitle;
  document.getElementById('t-card-sub').textContent    = t.cardSub;
  document.getElementById('t-label-name').textContent  = t.labelName;
  document.getElementById('name').placeholder          = t.placeholderName;
  document.getElementById('t-label-phone').textContent = t.labelPhone;
  document.getElementById('phone').placeholder         = t.placeholderPhone;
  document.getElementById('t-label-level').textContent = t.labelLevel;
  document.getElementById('t-label-reason').textContent = t.labelReason;
  document.getElementById('reason').placeholder        = t.placeholderReason;

  // Pills
  const lp = document.getElementById('level-pills');
  lp.innerHTML = '';
  t.levels.forEach((lbl, i) => {
    const el = document.createElement('label');
    el.className = 'pill';
    el.innerHTML = `<input type="radio" name="level" value="${t.levelValues[i]}" ${i===0?'checked':''}><span class="pill-label">${lbl}</span>`;
    lp.appendChild(el);
  });

  const btn = document.getElementById('cta-btn');
  if (!btn.disabled) btn.textContent = t.ctaBtn;
  document.getElementById('t-cta-note').textContent = t.ctaNote;

  // Success
  document.getElementById('t-success-title').textContent  = t.successTitle;
  document.getElementById('t-success-body').innerHTML     = t.successBody;
  document.getElementById('t-success-accent').textContent = t.successAccent;

  document.getElementById('t-footer').textContent = t.footer;
}

setLang('pt');

async function handleSubmit() {
  const name   = document.getElementById('name').value.trim();
  const phone  = document.getElementById('phone').value.trim();
  const reason = document.getElementById('reason').value.trim();
  const level  = document.querySelector('input[name="level"]:checked')?.value || '';
  const t = translations[currentLang];

  if (!name)   { shake('name');   return; }
  if (!phone)  { shake('phone');  return; }
  if (!reason) { shake('reason'); return; }

  const btn = document.getElementById('cta-btn');
  btn.textContent = t.sending;
  btn.disabled = true;

  try {
    const res = await fetch('https://formspree.io/f/xojkqkjd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        name, phone, level, reason,
        language: t.lang,
        _replyto: 'ravel.robaina@hotmail.com',
        _subject: `🎓 Novo Aluno: ${name} [${t.lang}]`
      })
    });
    if (res.ok) {
      document.getElementById('form-area').style.display = 'none';
      document.getElementById('success-msg').style.display = 'flex';
    } else { throw new Error(); }
  } catch {
    btn.textContent = t.errorBtn;
    btn.style.background = 'linear-gradient(135deg,#888,#555)';
    btn.disabled = false;
  }
}

function shake(id) {
  const el = document.getElementById(id);
  el.style.borderColor = '#FF6B6B';
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'shake 0.4s ease';
  setTimeout(() => { el.style.borderColor=''; el.style.animation=''; }, 800);
}
